<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">OmniQA automated pre-deployment QA architecture</title>
  <desc id="desc">A read-only Braze Campaign or Canvas moves through secure import, journey normalization, deterministic validators, evidence review, and a human approval gate. Deployment remains outside OmniQA.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f5ef"/>
      <stop offset="1" stop-color="#e9f2ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#17211f" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#16736d"/>
    </marker>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="64" y="72" fill="#1f2528" font-family="Arial, sans-serif" font-size="34" font-weight="800">OmniQA Automated QA Flow</text>
  <text x="64" y="108" fill="#5d6767" font-family="Arial, sans-serif" font-size="18">Read-only intake, automated evidence, and a human-controlled readiness decision.</text>

  <g fill="none" stroke="#16736d" stroke-width="4" marker-end="url(#arrow)">
    <path d="M242 280H318"/><path d="M526 280H602"/><path d="M810 280H886"/>
    <path d="M996 358V438"/>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g>
      <rect x="54" y="196" width="188" height="168" rx="18" fill="#1e293b"/>
      <text x="80" y="238" fill="#f8fafc" font-size="20" font-weight="800">Braze Asset</text>
      <text x="80" y="276" fill="#cbd5e1" font-size="15">Campaign or Canvas</text>
      <text x="80" y="304" fill="#cbd5e1" font-size="15">Approved URL / API ID</text>
      <text x="80" y="338" fill="#8fe0d0" font-size="14" font-weight="700">READ-ONLY SOURCE</text>
    </g>
    <g>
      <rect x="318" y="196" width="208" height="168" rx="18" fill="#311042" stroke="#c084fc" stroke-width="3"/>
      <text x="344" y="238" fill="#f8fafc" font-size="20" font-weight="800">Secure Import</text>
      <text x="344" y="276" fill="#f3e8ff" font-size="15">Vercel server route</text>
      <text x="344" y="304" fill="#f3e8ff" font-size="15">Server-only API key</text>
      <text x="344" y="332" fill="#f3e8ff" font-size="15">Details endpoints only</text>
    </g>
    <g>
      <rect x="602" y="196" width="208" height="168" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
      <text x="628" y="238" fill="#f8fafc" font-size="20" font-weight="800">Journey Model</text>
      <text x="628" y="276" fill="#cbd5e1" font-size="15">Steps and variants</text>
      <text x="628" y="304" fill="#cbd5e1" font-size="15">Email, push, SMS, IAM</text>
      <text x="628" y="332" fill="#cbd5e1" font-size="15">Draft safety metadata</text>
    </g>
    <g>
      <rect x="886" y="176" width="260" height="208" rx="18" fill="#1e1b4b" stroke="#818cf8" stroke-width="3"/>
      <text x="914" y="218" fill="#f8fafc" font-size="20" font-weight="800">Automated Checks</text>
      <text x="914" y="256" fill="#ddd6fe" font-size="15">Required channel content</text>
      <text x="914" y="284" fill="#ddd6fe" font-size="15">Liquid, links, UTMs, images</text>
      <text x="914" y="312" fill="#ddd6fe" font-size="15">Contrast and length limits</text>
      <text x="914" y="340" fill="#ddd6fe" font-size="15">Duplicates and journey safety</text>
    </g>
    <g>
      <rect x="826" y="438" width="320" height="170" rx="18" fill="#061712" stroke="#34d399" stroke-width="3"/>
      <text x="856" y="480" fill="#f8fafc" font-size="20" font-weight="800">Human Readiness Gate</text>
      <text x="856" y="518" fill="#bbf7d0" font-size="15">Evidence + required actions</text>
      <text x="856" y="546" fill="#bbf7d0" font-size="15">Reviewer checks, notes, timestamp</text>
      <text x="856" y="580" fill="#8fe0d0" font-size="14" font-weight="700">NO DEPLOYMENT OR WRITE-BACK</text>
    </g>
    <g>
      <rect x="54" y="438" width="690" height="170" rx="18" fill="#ffffff" stroke="#cbd8d4" stroke-width="2"/>
      <text x="84" y="480" fill="#1f2528" font-size="20" font-weight="800">Review Outputs</text>
      <text x="84" y="520" fill="#5d6767" font-size="16">Journey inventory and severity-ranked findings</text>
      <text x="84" y="550" fill="#5d6767" font-size="16">Focused message review, reviewer comments, email summary, and print/PDF report</text>
      <text x="84" y="584" fill="#b44f3d" font-size="14" font-weight="700">A PERSON STILL MAKES THE FINAL LAUNCH DECISION IN BRAZE</text>
    </g>
  </g>
</svg>
